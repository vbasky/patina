name: desktop

# Builds the installable desktop app (Tauri). Heavy: `cargo tauri build` runs
# desktop/app/prebuild.sh, which assembles the offline runtime (a relocatable
# Rust toolchain with the batteries crates vendored + a relocatable CPython) and
# compiles polars once — so expect long, large builds. Run on demand or on tags.
#
# macOS + Linux only: prebuild.sh / build.sh are Unix shell scripts (cp -a,
# symlinks, …). Windows packaging is not wired up yet.
#
# macOS signing + notarization is automatic when these repo secrets are set
# (without them the build still succeeds, just unsigned — Gatekeeper will warn):
#   APPLE_CERTIFICATE           base64 of a "Developer ID Application" .p12
#   APPLE_CERTIFICATE_PASSWORD  password for that .p12
#   APPLE_SIGNING_IDENTITY      e.g. "Developer ID Application: Name (TEAMID)"
#   APPLE_TEAM_ID               your 10-char Apple Developer Team ID
#   APPLE_ID                    Apple account email   (for notarization)
#   APPLE_PASSWORD              an app-specific password for that Apple ID
#   KEYCHAIN_PASSWORD           any throwaway string (temp keychain in CI)
# Export the .p12 with:  base64 -i cert.p12 | pbcopy

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  desktop:
    name: Desktop (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: macos-14, name: macos-aarch64 }
          - { runner: macos-13, name: macos-x86_64 }
          - { runner: ubuntu-22.04, name: linux-x86_64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # The Python kernel embeds CPython via pyo3, so a Python must be present to
      # compile it (separate from the relocatable CPython that gets bundled).
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: dtolnay/rust-toolchain@stable

      # Tauri's Linux webview/packaging dependencies.
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev librsvg2-dev libayatana-appindicator3-dev \
            build-essential patchelf file

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      # prebuild.sh (the beforeBuildCommand) builds the UI, the release server +
      # kernels, stages sidecars, and assembles the offline runtime into resources/.
      - name: Build desktop app
        working-directory: desktop/app
        env:
          PATINA_REBUILD_BUNDLE: "1"
          # macOS signing + notarization (ignored on Linux / when unset). The
          # Tauri CLI imports the cert into a temporary keychain and, if the
          # notarization creds are present, notarizes and staples the bundle.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: cargo tauri build

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: patina-desktop-${{ matrix.platform.name }}
          if-no-files-found: warn
          path: |
            desktop/app/target/release/bundle/**/*.dmg
            desktop/app/target/release/bundle/**/*.app
            desktop/app/target/release/bundle/**/*.deb
            desktop/app/target/release/bundle/**/*.AppImage
            desktop/app/target/release/bundle/**/*.rpm

  release:
    name: Attach to release
    runs-on: ubuntu-latest
    needs: [desktop]
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish installers to the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/patina-desktop-*/**
