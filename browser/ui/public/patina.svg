<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Patina logo">
  <defs>
    <!-- copper aging into verdigris -->
    <linearGradient id="pat" x1="40" y1="20" x2="200" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c47b3f"/>
      <stop offset="0.45" stop-color="#9c6a4e"/>
      <stop offset="0.7" stop-color="#3f9f8e"/>
      <stop offset="1" stop-color="#2b7d68"/>
    </linearGradient>
    <linearGradient id="patEdge" x1="120" y1="20" x2="120" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.18"/>
    </linearGradient>
  </defs>

  <!-- rounded-square tile (matches the app icon) -->
  <g>
    <rect x="16" y="16" width="208" height="208" rx="50" fill="url(#pat)"/>
    <rect x="16" y="16" width="208" height="208" rx="50" fill="url(#patEdge)"/>
  </g>

  <!-- notebook page -->
  <g>
    <rect x="80" y="72" width="80" height="96" rx="12" fill="#f5f1ea"/>
    <!-- punched binding holes in the margin -->
    <g fill="#2b7d68" fill-opacity="0.85">
      <circle cx="96" cy="98" r="3.6"/>
      <circle cx="96" cy="120" r="3.6"/>
      <circle cx="96" cy="142" r="3.6"/>
    </g>
    <!-- margin rule -->
    <line x1="108" y1="82" x2="108" y2="158" stroke="#c47b3f" stroke-opacity="0.55" stroke-width="3"/>
    <!-- cell / text lines (top one accented, like an active cell) -->
    <g stroke-width="9" stroke-linecap="round">
      <line x1="118" y1="98" x2="146" y2="98" stroke="#c47b3f"/>
      <line x1="118" y1="120" x2="148" y2="120" stroke="#2b7d68"/>
      <line x1="118" y1="142" x2="138" y2="142" stroke="#2b7d68"/>
    </g>
  </g>

  <!-- a few flecks of patina -->
  <g fill="#bfe6da" fill-opacity="0.5">
    <circle cx="60" cy="152" r="3.5"/>
    <circle cx="72" cy="178" r="2.5"/>
    <circle cx="170" cy="80" r="2.5"/>
  </g>
</svg>
