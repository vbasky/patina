<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Patina logo">
  <defs>
    <!-- copper aging into verdigris -->
    <linearGradient id="pat" x1="40" y1="20" x2="200" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c47b3f"/>
      <stop offset="0.45" stop-color="#9c6a4e"/>
      <stop offset="0.7" stop-color="#3f9f8e"/>
      <stop offset="1" stop-color="#2b7d68"/>
    </linearGradient>
    <linearGradient id="patEdge" x1="120" y1="20" x2="120" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.18"/>
    </linearGradient>
  </defs>

  <!-- flat-top hexagon (crate) -->
  <g>
    <path d="M120 16 L210 68 L210 172 L120 224 L30 172 L30 68 Z" fill="url(#pat)"/>
    <path d="M120 16 L210 68 L210 172 L120 224 L30 172 L30 68 Z" fill="url(#patEdge)"/>
    <path d="M120 16 L210 68 L210 172 L120 224 L30 172 L30 68 Z"
          fill="none" stroke="#1f5e4e" stroke-opacity="0.5" stroke-width="3"/>
  </g>

  <!-- >_ prompt -->
  <g stroke="#f5f1ea" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="92,92 128,120 92,148"/>
    <line x1="138" y1="152" x2="172" y2="152"/>
  </g>

  <!-- a few flecks of patina -->
  <g fill="#bfe6da" fill-opacity="0.5">
    <circle cx="64" cy="150" r="3.5"/>
    <circle cx="78" cy="176" r="2.5"/>
    <circle cx="158" cy="78" r="2.5"/>
  </g>
</svg>
